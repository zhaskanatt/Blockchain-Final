name: CI

on:
  push:
  pull_request:

jobs:
  contracts:
    name: Contracts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Build
        run: forge build

      - name: Format check
        run: forge fmt --check

      - name: Test
        run: forge test -vvv

      - name: Coverage
        run: forge coverage --ir-minimum

      - name: Install Slither
        run: pipx install slither-analyzer

      - name: Slither
        run: slither . --exclude-dependencies || true

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

  subgraph:
    name: Subgraph
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Build contracts for ABI artifacts
        run: forge build

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: subgraph/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: subgraph

      - name: Codegen
        run: npx graph codegen
        working-directory: subgraph

      - name: Build subgraph
        run: npx graph build
        working-directory: subgraph